
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #f5f7fb;
    --text: #1a1d2e;
    --text2: #5a5f7a;
    --accent: #4f46e5;
    --accent2: #7c3aed;
    --border: rgba(0,0,0,0.08);
    --card-shadow: 0 4px 20px rgba(79,70,229,0.10);
    --btn-shadow: 0 4px 14px rgba(79,70,229,0.25);
    --front-bg: #ffffff;
    --back-bg: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    --badge-bg: rgba(79,70,229,0.10);
    --badge-text: #4f46e5;
    --img-border: rgba(79,70,229,0.15);
    --zoom-overlay: rgba(0,0,0,0.85);
  }

  .dark {
    --bg: #0f1021;
    --surface: #1a1d2e;
    --surface2: #242741;
    --text: #e8eaf6;
    --text2: #9097b8;
    --accent: #818cf8;
    --accent2: #a78bfa;
    --border: rgba(255,255,255,0.08);
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
    --btn-shadow: 0 4px 18px rgba(129,140,248,0.3);
    --front-bg: #1e2235;
    --back-bg: linear-gradient(135deg, #3730a3 0%, #5b21b6 100%);
    --badge-bg: rgba(129,140,248,0.15);
    --badge-text: #a5b4fc;
    --img-border: rgba(129,140,248,0.2);
    --zoom-overlay: rgba(0,0,0,0.92);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.4s, color 0.4s;
    padding-bottom: 2rem;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem 1.2rem;
    gap: 0.3rem;
    position: relative;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
    text-align: center;
  }

  .header .subtitle {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .header .badge {
    margin-top: 6px;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  .toggle-btn {
    position: absolute;
    top: 1.8rem;
    right: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    width: 52px;
    height: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    padding: 3px;
    transition: background 0.3s, border 0.3s;
  }

  .toggle-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  body:not(.dark) .toggle-thumb { transform: translateX(0px); }
  body.dark .toggle-thumb { transform: translateX(24px); }

  .progress-bar-wrap {
    max-width: 680px;
    margin: 0 auto 1.2rem;
    padding: 0 1.5rem;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 680px;
    margin: 0 auto 1.5rem;
    padding: 0 1.5rem;
  }

  .card {
    height: 200px;
    perspective: 1200px;
    cursor: pointer;
  }

  .inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
    border-radius: 14px;
  }

  .card.flip .inner {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    padding: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
  }

  .front {
    background: var(--front-bg);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    gap: 8px;
  }

  .front::before {
    content: '';
    width: 28px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    flex-shrink: 0;
  }

  .front .hint {
    font-size: 10px;
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-top: auto;
  }

  .back {
    background: var(--back-bg);
    transform: rotateY(180deg);
    font-size: 12px;
    line-height: 1.5;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
  }

  .back .num {
    font-size: 22px;
    font-weight: 600;
    opacity: 0.25;
    font-family: 'Playfair Display', serif;
    position: absolute;
    top: 10px;
    right: 14px;
  }

  .card:hover .inner {
    transform: translateY(-3px);
  }

  .card.flip:hover .inner {
    transform: rotateY(180deg) translateY(-3px);
  }

  .btns-row {
    display: flex;
    gap: 12px;
    max-width: 680px;
    margin: 0 auto 2rem;
    padding: 0 1.5rem;
  }

  .btn {
    flex: 1;
    padding: 12px 20px;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.03em;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    box-shadow: var(--btn-shadow);
  }

  .btn-primary:hover { box-shadow: 0 6px 20px rgba(79,70,229,0.4); transform: translateY(-1px); }

  .btn-outline {
    background: var(--surface);
    color: var(--accent);
    border: 1.5px solid var(--accent);
  }

  .btn-outline:hover { background: var(--badge-bg); }

  .img-section {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 1.5rem 1rem;
  }

  .img-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .img-label::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .img-wrap {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--img-border);
    cursor: zoom-in;
    position: relative;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
    box-shadow: 0 2px 16px rgba(79,70,229,0.08);
  }

  .img-wrap:hover {
    transform: scale(1.015);
    box-shadow: 0 8px 28px rgba(79,70,229,0.16);
  }

  .img-wrap img {
    width: 100%;
    display: block;
  }

  .img-zoom-hint {
    position: absolute;
    bottom: 10px;
    right: 12px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.04em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .img-wrap:hover .img-zoom-hint { opacity: 1; }

  .zoom-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--zoom-overlay);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    backdrop-filter: blur(6px);
  }

  .zoom-modal.open { display: flex; animation: fadeIn 0.25s ease; }

  .zoom-modal img {
    max-width: 94vw;
    max-height: 90vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: zoomIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .zoom-close {
    position: fixed;
    top: 18px;
    right: 22px;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
    opacity: 0.8;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
  }

  .zoom-close:hover { opacity: 1; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes zoomIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .flip-enter {
    animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 520px) {
    .container { grid-template-columns: repeat(2, 1fr); }
    .header h1 { font-size: 20px; }
  }
</style>

<div id="app">
  <div class="header">
    <button class="toggle-btn" onclick="toggleDark()" aria-label="Cambiar tema">
      <div class="toggle-thumb" id="thumbIcon">☀️</div>
    </button>
    <div class="subtitle">Otorrinolaringología · ORL</div>
    <h1>Tarjetas de Acumetría</h1>
    <div class="badge">Presentado por Santiago Otero</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span id="progLabel">Bloque 1 de 4</span>
      <span id="progCount">6 tarjetas</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progFill" style="width: 25%"></div>
    </div>
  </div>

  <div class="container" id="cards"></div>

  <div class="btns-row">
    <button class="btn btn-outline" onclick="prevSet()">← Anterior</button>
    <button class="btn btn-primary" onclick="nextSet()">Siguiente →</button>
  </div>

  <div class="img-section">
    <div class="img-label">Referencia visual</div>
    <div class="img-wrap" onclick="openZoom()">
      <img src="acumetria.png" alt="Acumetría con diapasones">
      <div class="img-zoom-hint">Toca para ampliar</div>
    </div>
  </div>
</div>

<div class="zoom-modal" id="zoomModal" onclick="closeZoom()">
  <span class="zoom-close" onclick="closeZoom()">×</span>
  <img src="acumetria.png" alt="Acumetría con diapasones ampliada">
</div>

<script>
const data = [
  ["Prueba de Weber: qué evalúa","Evalúa la lateralización del sonido mediante conducción ósea en la línea media del cráneo. Permite identificar asimetrías entre ambos oídos."],
  ["Weber: interpretación clínica","Sin lateralización: audición normal o pérdida bilateral. Al oído enfermo: hipoacusia conductiva. Al oído sano: hipoacusia neurosensorial."],
  ["Prueba de Rinne: fundamento","Compara conducción aérea (CA) vs conducción ósea (CO). Se realiza mastoides → conducto auditivo."],
  ["Rinne: interpretación","CA > CO (positivo): normal o neurosensorial. CO > CA (negativo): conductiva."],
  ["Prueba de Schwabach","Compara duración de conducción ósea entre paciente y examinador."],
  ["Schwabach: interpretación","Normal: igual duración. Alargado: conductiva. Acortado: neurosensorial."],
  ["Relación Weber + Rinne","No deben interpretarse por separado. Su combinación define el tipo de hipoacusia."],
  ["Patrón conductivo completo","Rinne negativo + Weber al afectado + Schwabach alargado."],
  ["Patrón neurosensorial completo","Rinne positivo + Weber al sano + Schwabach acortado."],
  ["Audición normal","Weber central + Rinne positivo bilateral + Schwabach normal."],
  ["Conductiva bilateral","Weber central (simetría) + Rinne negativo bilateral + Schwabach alargado."],
  ["Neurosensorial bilateral","Weber central + Rinne positivo + Schwabach acortado."],
  ["Evaluación con voz (dB)","Susurrada (0–25 dB): normal. Conversacional (40–60 dB): moderada. Gritada (70–90 dB): severa. Sin respuesta (>90 dB): profunda."],
  ["Importancia de la voz","Permite estimar rápidamente el grado de pérdida auditiva antes de audiometría."],
  ["Conductiva asimétrica","Weber lateraliza al oído más afectado + Rinne negativo."],
  ["Neurosensorial unilateral","Weber lateraliza al oído sano + Rinne positivo + Schwabach acortado."],
  ["Hipoacusia mixta","Combina hallazgos conductivos y neurosensoriales. Rinne puede ser negativo con Schwabach acortado."],
  ["Error común en Weber","Confundir lateralización: conductiva va al oído enfermo, no al sano."],
  ["Caso conductiva bilateral","Voz moderada + Weber central + Rinne negativo bilateral + Schwabach alargado."],
  ["Caso conductiva asimétrica","Weber al más afectado + Rinne negativo bilateral."],
  ["Caso combinado","Un oído conductivo y otro neurosensorial. Weber se va al lado conductivo."],
  ["Caso neurosensorial profunda","No percibe voz + Weber central + Rinne positivo + Schwabach acortado."],
  ["Caso neurosensorial unilateral","Sin respuesta en oído afectado + Weber al sano."],
  ["Conclusión clínica","La acumetría orienta diagnóstico, pero debe confirmarse con audiometría."]
];

let index = 0;
const PER = 6;
const totalBlocks = Math.ceil(data.length / PER);

function render(animate) {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  const block = data.slice(index, index + PER);
  block.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (animate ? ' flip-enter' : '');
    card.style.animationDelay = (i * 0.06) + 's';
    card.innerHTML = `
      <div class="inner">
        <div class="face front">
          ${item[0]}
          <span class="hint">Toca para ver respuesta</span>
        </div>
        <div class="face back">
          <span class="num">${index + i + 1}</span>
          ${item[1]}
        </div>
      </div>`;
    card.onclick = () => card.classList.toggle('flip');
    container.appendChild(card);
  });
  updateProgress();
}

function updateProgress() {
  const blockNum = Math.floor(index / PER) + 1;
  document.getElementById('progLabel').textContent = `Bloque ${blockNum} de ${totalBlocks}`;
  document.getElementById('progCount').textContent = `${Math.min(PER, data.length - index)} tarjetas`;
  document.getElementById('progFill').style.width = (blockNum / totalBlocks * 100) + '%';
}

function nextSet() {
  index = (index + PER) >= data.length ? 0 : index + PER;
  render(true);
}

function prevSet() {
  index = index - PER < 0 ? Math.floor((data.length - 1) / PER) * PER : index - PER;
  render(true);
}

function toggleDark() {
  document.body.classList.toggle('dark');
  const thumb = document.getElementById('thumbIcon');
  thumb.textContent = document.body.classList.contains('dark') ? '🌙' : '☀️';
}

function openZoom() {
  document.getElementById('zoomModal').classList.add('open');
}

function closeZoom() {
  document.getElementById('zoomModal').classList.remove('open');
}

render(false);
</script>
